services:
  - type: web
    name: feed-raw-material-wecom
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "cd static/wecom && python app.py"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.9"
